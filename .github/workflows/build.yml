name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04          # older glibc = broader Linux compat
            artifact: keydup-linux-x86_64
          - os: macos-15              # essentia arm64 wheels need macOS 15+
            artifact: keydup-macos-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          path: keydup

      # keypipe is a path dependency at ../keypipe (see [tool.uv.sources])
      - uses: actions/checkout@v4
        with:
          repository: ericoulster/keypipe
          path: keypipe

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libnss3 libasound2 libpulse0

      - name: Sync dependencies
        working-directory: keydup
        run: uv sync --dev

      - name: CPU-only torch (Linux)
        if: runner.os == 'Linux'
        working-directory: keydup
        run: uv pip install torch==2.11.0 --index-url https://download.pytorch.org/whl/cpu --reinstall-package torch

      - name: Tests (headless)
        working-directory: keydup
        timeout-minutes: 30
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest tests -q

      - name: Build bundle
        working-directory: keydup
        run: uv run pyinstaller packaging/keydup.spec --noconfirm

      - name: Self-test built bundle
        working-directory: keydup
        timeout-minutes: 10
        env:
          QT_QPA_PLATFORM: offscreen
          # torch and essentia-tensorflow each bundle a libomp; macOS
          # deadlocks on the duplicate without this
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: ./dist/keydup/keydup --self-test

      - name: Package (Linux)
        if: runner.os == 'Linux'
        working-directory: keydup/dist
        run: tar czf ${{ matrix.artifact }}.tar.gz keydup

      - name: Package (macOS)
        if: runner.os == 'macOS'
        working-directory: keydup/dist
        run: ditto -c -k --keepParent "key'd up.app" ${{ matrix.artifact }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            keydup/dist/${{ matrix.artifact }}.tar.gz
            keydup/dist/${{ matrix.artifact }}.zip
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            keydup/dist/${{ matrix.artifact }}.tar.gz
            keydup/dist/${{ matrix.artifact }}.zip
