name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# the Release step creates GitHub releases on tag pushes
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04          # older glibc = broader Linux compat
            artifact: keydup-linux-x86_64
          - os: macos-15              # essentia arm64 wheels need macOS 15+
            artifact: keydup-macos-arm64
          - os: windows-2022          # ONNX BPM backend (no essentia wheels)
            artifact: keydup-windows-x86_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          path: keydup

      # keypipe is a path dependency at ../keypipe (see [tool.uv.sources])
      - uses: actions/checkout@v4
        with:
          repository: ericoulster/keypipe
          path: keypipe

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Free runner disk (Linux)
        if: runner.os == 'Linux'
        # the bundle + venv + wheel caches brush against the runner's
        # free space; drop ~25GB of preinstalled toolchains we never use
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

      - name: Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libnss3 libasound2 libpulse0

      - name: Sync dependencies
        working-directory: keydup
        run: uv sync --dev

      - name: CPU-only torch (Linux)
        if: runner.os == 'Linux'
        working-directory: keydup
        # swap in the CPU wheel, then remove the CUDA libs the original
        # sync pulled in - PyInstaller bundles them otherwise (~2GB)
        # --python .venv: setup-uv exports VIRTUAL_ENV pointing at a
        # workspace venv, which uv pip would otherwise target instead of
        # the project env that uv run builds from
        run: |
          uv pip install --python .venv torch==2.11.0 --index-url https://download.pytorch.org/whl/cpu --reinstall-package torch
          uv pip freeze --python .venv | grep -iE '^(nvidia-|triton)' | cut -d= -f1 | xargs -r uv pip uninstall --python .venv
          uv cache clean
          uv run --no-sync python -c "import torch; v = torch.__version__; assert '+cpu' in v, f'CUDA torch still present: {v}'"
          uv run --no-sync python -c "import importlib.util as u; assert u.find_spec('nvidia') is None, 'nvidia libs still installed'" 

      - name: Tests (headless)
        working-directory: keydup
        timeout-minutes: 30
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run --no-sync pytest tests -q

      - name: Build bundle
        working-directory: keydup
        run: uv run --no-sync pyinstaller packaging/keydup.spec --noconfirm

      - name: Self-test built bundle
        if: runner.os != 'Windows'
        working-directory: keydup
        timeout-minutes: 10
        env:
          QT_QPA_PLATFORM: offscreen
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: ./dist/keydup/keydup --self-test

      - name: Self-test built bundle (Windows)
        if: runner.os == 'Windows'
        working-directory: keydup
        timeout-minutes: 10
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        # windowed exes swallow stdout and show dialogs on error; the
        # bundle ships a console twin for exactly this
        run: ./dist/keydup/keydup-cli.exe --self-test

      - name: Package (Linux)
        if: runner.os == 'Linux'
        working-directory: keydup/dist
        run: tar czf ${{ matrix.artifact }}.tar.gz keydup

      - name: Package (macOS)
        if: runner.os == 'macOS'
        working-directory: keydup/dist
        run: ditto -c -k --keepParent "key'd up.app" ${{ matrix.artifact }}.zip

      - name: Package (Windows)
        if: runner.os == 'Windows'
        working-directory: keydup/dist
        shell: pwsh
        run: Compress-Archive -Path keydup -DestinationPath ${{ matrix.artifact }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            keydup/dist/${{ matrix.artifact }}.tar.gz
            keydup/dist/${{ matrix.artifact }}.zip
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            keydup/dist/${{ matrix.artifact }}.tar.gz
            keydup/dist/${{ matrix.artifact }}.zip
